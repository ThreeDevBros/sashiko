  <body>
    <div id="root"></div>
    <!-- Blocking script: apply cached branding colors BEFORE React renders to prevent flash -->
    <script>
      (function() {
        try {
          var cached = localStorage.getItem('cached-branding');
          if (!cached) return;
          var b = JSON.parse(cached);
          var root = document.documentElement;
          function hexToHSL(hex) {
            var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            if (!result) return null;
            var r = parseInt(result[1], 16) / 255;
            var g = parseInt(result[2], 16) / 255;
            var bl = parseInt(result[3], 16) / 255;
            var max = Math.max(r, g, bl), min = Math.min(r, g, bl);
            var h = 0, s = 0, l = (max + min) / 2;
            if (max !== min) {
              var d = max - min;
              s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
              if (max === r) h = ((g - bl) / d + (g < bl ? 6 : 0)) / 6;
              else if (max === g) h = ((bl - r) / d + 2) / 6;
              else h = ((r - g) / d + 4) / 6;
            }
            return Math.round(h * 360) + ' ' + Math.round(s * 100) + '% ' + Math.round(l * 100) + '%';
          }
          if (b.primary_color) {
            var p = hexToHSL(b.primary_color);
            if (p) { root.style.setProperty('--primary', p); root.style.setProperty('--ring', p); }
          }
          if (b.secondary_color) {
            var s = hexToHSL(b.secondary_color);
            if (s) root.style.setProperty('--secondary', s);
          }
          if (b.accent_color) {
            var a = hexToHSL(b.accent_color);
            if (a) root.style.setProperty('--accent', a);
          }
          var isDark = root.classList.contains('dark') || root.classList.contains('dark-grey');
          if (!isDark && b.background_color) {
            var bg = hexToHSL(b.background_color);
            if (bg) root.style.setProperty('--background', bg);
          }
          if (b.font_family) {
            root.style.setProperty('--font-family', b.font_family);
            document.body && (document.body.style.fontFamily = b.font_family);
          }
        } catch(e) {}
      })();
    </script>
